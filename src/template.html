<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Webpack Template</title>
    </head>

    <header>
        <h1>ToDo List</h1>
        <h2>by Dakota McMann </h2>
    </header>

    <body>

        <!-- Forms -->
        <dialog id = "NewProjectDialog">
            <form id = "NewProjectForm">
            </form>
        </dialog>

        <dialog id = "NewTaskDialog">
            <form id = "NewTaskForm">
            </form>
        </dialog>

        <!-- Content Layout -->
        <div id = "LayoutContainer">
            <div id = "SideBarContainer">
                <h3>Projects</h3>
                <button id = "NewProjectButton">New Project</button>
                <div id = "ProjectContainer">
                </div>
            </div>
            <div id = "ContentContainer">
                <h3>Tasks</h3>
                <button id = "NewTaskButton">New Task</button>
                <div if = "TaskContainer">
                </div>
            </div>
        </div>

    </body>
</html>
