<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>Webpack Template</title>
    </head>

    <header>
        <h1>ToDo List</h1>
        <h2>by Dakota McMann </h2>
    </header>

    <body>

        <!-- Forms -->
        <dialog id = "NewProjectDialog" class = "FormDialog">
            <div class = "FormWrapper">
                <form id = "NewProjectForm">
                    <h3>Add New Project</h3>
                    <div class = "formLine">
                        <label for = "ProjectName">Project Name: </label>
                        <input type = "text" id = "ProjectName" name = "ProjectName" required>
                    </div>
                    <div class = "formLine">
                        <label for = "ProjectDescription">Project Description:</label>
                        <input type = "text" id = "ProjectDescription" name = "ProjectName" required>
                    </div>
                    <button type = "submit">Add Project</button>
                    <button type = "button" id = "ProjectFormCloseButton">Close</button>
                </form>
            </div>
        </dialog>

        <dialog id = "NewTaskDialog" class = "FormDialog">
            <div class = "FormWrapper">
                <form id = "NewTaskForm">
                </form>
            </div>
        </dialog>

        <!-- Content Layout -->
        <div id = "LayoutContainer">
            <div id = "SideBarContainer">
                <h3>Projects</h3>
                <button id = "NewProjectButton">New Project</button>
                <div id = "ProjectContainer">
                </div>
            </div>
            <div id = "ContentContainer">
                <h3>Tasks</h3>
                <button id = "NewTaskButton">New Task</button>
                <div if = "TaskContainer">
                </div>
            </div>
        </div>

    </body>
</html>
